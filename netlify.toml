[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Secrets scanning configuration.
#
# The truly-secret env var is `SUPABASE_SERVICE_ROLE_KEY` — it bypasses RLS
# and must never appear in the client bundle or function output. Mark *only*
# that one as "contains secrets" in the Netlify UI.
#
# Everything else listed below is either:
#   - designed to be public (Supabase URL + anon key — RLS protects the DB), or
#   - a feature flag / non-secret config value
# so we tell Netlify's scanner to skip them. Without this, the scanner trips
# on the anon-key JWT pattern even though it's safe to ship.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_IMAGE_BUCKET,VALUE_SOURCE_ADAPTERS,ENABLE_AMVERSE,ENABLE_ADOPT_ME_TRADING_VALUES,ENABLE_AMTV_LEGACY_MIRROR,ENABLE_GITHUB_DATASET,ENABLE_GITHUB_IRONBABA,ENABLE_GITHUB_HIGH_TIER"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  framework = "vite"

[functions]
  node_bundler = "esbuild"
  included_files = []

# Scheduled daily value sync.
# Runs every day at 06:15 UTC; adjust to suit your time zone.
[functions."sync-values"]
  schedule = "15 6 * * *"

# Friendly URL rewrites for the API namespace.
[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/search-index"
  to = "/.netlify/functions/search-index"
  status = 200

[[redirects]]
  from = "/api/items/:slug"
  to = "/.netlify/functions/items?slug=:slug"
  status = 200

[[redirects]]
  from = "/api/import-runs/latest"
  to = "/.netlify/functions/import-runs-latest"
  status = 200

# SPA fallback for client-side routing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=86400, stale-while-revalidate=86400"
